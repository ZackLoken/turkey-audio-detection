<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>turkey-canvas</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0e1117; color: #fff;
               font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

  #root { display: flex; flex-direction: column; gap: 8px; }

  /* Custom audio control: play button → timestamp → scrubber. The native
     <audio controls> is hidden because it doesn't allow injecting the timestamp
     between the play button and the progress bar. */
  #audio-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 8px; background: #1d2129; border-radius: 4px;
  }
  #play-btn {
    background: #2a2f3a; border: 1px solid #555; color: #fff;
    width: 36px; height: 30px; border-radius: 4px;
    font-size: 14px; line-height: 1; cursor: pointer;
    font: inherit;
  }
  #play-btn:hover { background: #353a47; }
  #time-display {
    font-family: monospace; font-size: 13px; color: #cccccc;
    min-width: 140px;
  }
  #scrubber {
    flex: 1; appearance: none; -webkit-appearance: none;
    height: 6px; background: #2a2f3a; border-radius: 3px;
    outline: none; cursor: pointer; margin: 0;
  }
  #scrubber::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; background: #cccccc;
    border-radius: 50%; cursor: pointer;
  }
  #scrubber::-moz-range-thumb {
    width: 14px; height: 14px; background: #cccccc;
    border-radius: 50%; cursor: pointer; border: none;
  }

  /* One-line gap between audio bar and controls. */
  #gap { height: 16px; }

  /* Controls row: active-label toggle + clip-level checkboxes, all inline. */
  #controls-row {
    display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
    justify-content: center;
    font-size: 14px;
  }
  .ctrl-label { color: #cccccc; margin-right: 2px; }
  .label-toggle { display: inline-flex; }
  .label-btn {
    border: 1px solid #555; background: #1d2129; color: #cccccc;
    padding: 4px 14px; cursor: pointer;
    font: inherit;
    transition: background 80ms, color 80ms, border-color 80ms;
  }
  .label-btn:first-child { border-radius: 4px 0 0 4px; }
  .label-btn:last-child  { border-radius: 0 4px 4px 0; border-left: none; }
  .label-btn.active.tom { background: #39ff14; color: #0e1117; border-color: #39ff14; }
  .label-btn.active.hen { background: #4169e1; color: #ffffff; border-color: #4169e1; }
  .label-btn:not(.active):hover { background: #2a2f3a; color: #ffffff; }
  .checkbox-ctrl { display: inline-flex; align-items: center; gap: 6px; color: #cccccc;
                   cursor: pointer; user-select: none; }
  .checkbox-ctrl input { cursor: pointer; }

  /* Spectrogram + drawing canvas + playhead.
     canvas-wrap is full-width so the spectrogram matches the audio bar's extent;
     the underlying canvas drawing buffer stays at 1200×320 px (high enough for
     accurate annotation regardless of CSS display size). */
  #canvas-wrap { position: relative; display: block; width: 100%; line-height: 0; }
  #bg { display: block; width: 100%; height: auto; user-select: none; -webkit-user-drag: none; }
  #draw { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }
  #playhead {
    position: absolute; top: 0; height: 100%;
    width: 4px; transform: translateX(-2px);
    background: #000;
    border-left: 1px solid #ffffff;
    border-right: 1px solid #ffffff;
    pointer-events: none; opacity: 0.55;
    transition: opacity 0.15s; display: none;
  }
  #label-hint {
    position: absolute; top: 4px; right: 6px;
    font-family: monospace; font-size: 11px; line-height: 1;
    padding: 3px 6px; border-radius: 3px;
    background: rgba(0,0,0,0.65); color: #ccc;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="root">
  <div id="audio-bar">
    <button type="button" id="play-btn">&#9654;</button>
    <span id="time-display">0.000 / 0.000 s</span>
    <input type="range" id="scrubber" min="0" max="1000" value="0" step="1">
  </div>
  <audio id="clip-audio" preload="auto" autoplay style="display: none;">
    <source id="audio-src" type="audio/wav">
  </audio>

  <div id="gap"></div>

  <div id="controls-row">
    <span class="ctrl-label">Active label</span>
    <div class="label-toggle">
      <button type="button" id="btn-tom" class="label-btn tom active" data-label="Tom">Tom</button>
      <button type="button" id="btn-hen" class="label-btn hen" data-label="Hen">Hen</button>
    </div>
    <label class="checkbox-ctrl">
      <input type="checkbox" id="other-birds-cb">
      <span>Other birds present</span>
    </label>
    <label class="checkbox-ctrl">
      <input type="checkbox" id="unsure-cb">
      <span>Unsure</span>
    </label>
  </div>

  <div id="canvas-wrap">
    <img id="bg" />
    <canvas id="draw"></canvas>
    <div id="playhead"></div>
    <div id="label-hint">Tom</div>
  </div>
</div>

<script>
(function () {
  const audio = document.getElementById('clip-audio');
  const audioSrc = document.getElementById('audio-src');
  const playBtn = document.getElementById('play-btn');
  const scrubber = document.getElementById('scrubber');
  const timeDisplay = document.getElementById('time-display');
  const btnTom = document.getElementById('btn-tom');
  const btnHen = document.getElementById('btn-hen');
  const otherBirdsCb = document.getElementById('other-birds-cb');
  const unsureCb = document.getElementById('unsure-cb');
  const img = document.getElementById('bg');
  const canvas = document.getElementById('draw');
  const ctx = canvas.getContext('2d');
  const playhead = document.getElementById('playhead');
  const labelHint = document.getElementById('label-hint');

  const ICON_PLAY = '▶';
  const ICON_PAUSE = '⏸';

  // ---------- state ---------------------------------------------------------
  let rectangles = [];
  let strokeTom = '#39ff14';
  let strokeHen = '#4169e1';
  let fillAlpha = '0.15';
  let activeLabel = 'Tom';
  let drawing = false;
  let pendingClick = false;          // mousedown happened, not yet decided draw-vs-click
  let downX = 0, downY = 0;
  let startX = 0, startY = 0;
  let currentRect = null;
  let frameKey = null;
  let dataLeftFrac = 0.055;
  let dataBottomFrac = 0.13;
  let dataTopFrac = 1.0;
  let fminHz = 50.0;
  let fmaxHz = 14000.0;
  let previewStopAt = null;  // seconds; pauses audio when reached

  function activeStroke() { return activeLabel === 'Tom' ? strokeTom : strokeHen; }
  function dataLeftPx() { return canvas.width * dataLeftFrac; }
  function dataWidthPx() { return canvas.width - dataLeftPx(); }
  function dataTopPx() { return canvas.height * (1 - dataTopFrac); }
  function dataBottomPx() { return canvas.height * (1 - dataBottomFrac); }

  // Mel ↔ Hz (same formula librosa uses).
  function hzToMel(hz) { return 2595 * Math.log10(1 + hz / 700); }
  function melToHz(m) { return 700 * (Math.pow(10, m / 2595) - 1); }

  function canvasYToHz(y) {
    const top = dataTopPx();
    const bot = dataBottomPx();
    const yClip = Math.max(top, Math.min(bot, y));
    const frac = 1 - (yClip - top) / (bot - top);   // 1 at top (high), 0 at bottom (low)
    const mel = hzToMel(fminHz) + frac * (hzToMel(fmaxHz) - hzToMel(fminHz));
    return melToHz(mel);
  }

  // ---------- Web Audio bandpass for box-bounded preview --------------------
  // We route the audio element through a highpass + lowpass biquad chain so the
  // preview can be band-limited to the box's frequency bounds. The graph stays
  // connected; when no preview is active we set cutoffs to passthrough.
  let audioCtx = null;
  let bpHigh = null;
  let bpLow = null;

  function ensureAudioGraph() {
    if (audioCtx) return;
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      audioCtx = new Ctx();
      const src = audioCtx.createMediaElementSource(audio);
      bpHigh = audioCtx.createBiquadFilter();
      bpHigh.type = 'highpass';
      bpHigh.frequency.value = 20;
      bpLow = audioCtx.createBiquadFilter();
      bpLow.type = 'lowpass';
      bpLow.frequency.value = audioCtx.sampleRate / 2;
      src.connect(bpHigh).connect(bpLow).connect(audioCtx.destination);
    } catch (e) {
      audioCtx = null;
    }
  }
  function setBandpass(fmin, fmax) {
    ensureAudioGraph();
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    bpHigh.frequency.value = Math.max(20, fmin || 20);
    bpLow.frequency.value = Math.min(audioCtx.sampleRate / 2, fmax || (audioCtx.sampleRate / 2));
  }
  function clearBandpass() {
    if (!audioCtx) return;
    bpHigh.frequency.value = 20;
    bpLow.frequency.value = audioCtx.sampleRate / 2;
  }

  // ---------- streamlit bridge ---------------------------------------------
  function send(type, payload) {
    const data = Object.assign({ isStreamlitMessage: true, type }, payload || {});
    window.parent.postMessage(data, '*');
  }
  function sendValue() {
    send('streamlit:setComponentValue', {
      value: {
        rectangles: rectangles.map(r => ({
          left: r.x, top: r.y, width: r.w, height: r.h,
          stroke: r.stroke, label: r.label,
        })),
        activeLabel: activeLabel,
        otherBirdsPresent: otherBirdsCb.checked,
        unsure: unsureCb.checked,
      },
      dataType: 'json',
    });
  }
  function sendFrameHeight(h) {
    send('streamlit:setFrameHeight', { height: h });
  }

  // ---------- canvas drawing ----------------------------------------------
  function fillForStroke(stroke) {
    if (stroke[0] === '#' && stroke.length === 7) {
      const r = parseInt(stroke.slice(1, 3), 16);
      const g = parseInt(stroke.slice(3, 5), 16);
      const b = parseInt(stroke.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${fillAlpha})`;
    }
    return 'rgba(255,255,255,' + fillAlpha + ')';
  }
  function drawOneRect(r, stroke) {
    ctx.fillStyle = fillForStroke(stroke);
    ctx.fillRect(r.x, r.y, r.w, r.h);
    ctx.lineWidth = 5;
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.strokeRect(r.x, r.y, r.w, r.h);
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = stroke;
    ctx.strokeRect(r.x, r.y, r.w, r.h);
  }
  function redraw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const r of rectangles) drawOneRect(r, r.stroke);
    if (currentRect) drawOneRect(currentRect, activeStroke());
  }
  function localXY(e) {
    const rect = canvas.getBoundingClientRect();
    return [
      ((e.clientX - rect.left) / rect.width) * canvas.width,
      ((e.clientY - rect.top) / rect.height) * canvas.height,
    ];
  }

  // Map a canvas-pixel x into a clip-time in seconds.
  function canvasXToTime(x) {
    if (!isFinite(audio.duration) || audio.duration <= 0) return 0;
    const frac = (x - dataLeftPx()) / dataWidthPx();
    return Math.max(0, Math.min(1, frac)) * audio.duration;
  }

  function previewRect(r) {
    if (!isFinite(audio.duration) || audio.duration <= 0) return;
    const start = canvasXToTime(r.x);
    const end = canvasXToTime(r.x + r.w);
    if (end <= start) return;
    // Box y-bounds → frequency band (high y = low Hz, low y = high Hz).
    const fmin = canvasYToHz(r.y + r.h);
    const fmax = canvasYToHz(r.y);
    setBandpass(fmin, fmax);
    audio.pause();
    audio.currentTime = start;
    previewStopAt = end;
    audio.play().catch(function () {});
  }

  function rectAt(x, y) {
    for (let i = rectangles.length - 1; i >= 0; i--) {
      const r = rectangles[i];
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) return i;
    }
    return -1;
  }

  // mousedown stores the start point but doesn't commit to a draw until either
  // (a) the user drags > 3 px (= new rectangle) or (b) mouseup arrives without
  // movement (= click → replay any rectangle under the cursor).
  canvas.addEventListener('mousedown', (e) => {
    [downX, downY] = localXY(e);
    pendingClick = true;
    drawing = false;
    currentRect = null;
  });
  canvas.addEventListener('mousemove', (e) => {
    if (!pendingClick && !drawing) return;
    const [x, y] = localXY(e);
    if (pendingClick) {
      if (Math.hypot(x - downX, y - downY) > 3) {
        pendingClick = false;
        drawing = true;
        startX = downX; startY = downY;
        currentRect = { x: startX, y: startY, w: 0, h: 0,
                        stroke: activeStroke(), label: activeLabel };
      }
    }
    if (drawing) {
      currentRect.x = Math.min(startX, x);
      currentRect.y = Math.min(startY, y);
      currentRect.w = Math.abs(x - startX);
      currentRect.h = Math.abs(y - startY);
      redraw();
    }
  });
  function finishDraw() {
    drawing = false;
    if (currentRect && currentRect.w > 3 && currentRect.h > 3) {
      rectangles.push(currentRect);
      previewRect(currentRect);
      sendValue();
    }
    currentRect = null;
    redraw();
  }
  canvas.addEventListener('mouseup', (e) => {
    if (drawing) {
      finishDraw();
    } else if (pendingClick) {
      const [x, y] = localXY(e);
      const idx = rectAt(x, y);
      if (idx >= 0) previewRect(rectangles[idx]);
    }
    pendingClick = false;
  });
  canvas.addEventListener('mouseleave', () => {
    if (drawing) finishDraw();
    pendingClick = false;
  });
  canvas.addEventListener('dblclick', (e) => {
    const [x, y] = localXY(e);
    const idx = rectAt(x, y);
    if (idx >= 0) {
      rectangles.splice(idx, 1);
      redraw();
      sendValue();
    }
  });

  // ---------- audio + timestamp + playhead --------------------------------
  function fmt(t) { return (t || 0).toFixed(3); }
  function updateTime() {
    const t = audio.currentTime || 0;
    const d = isFinite(audio.duration) ? audio.duration : 0;
    timeDisplay.textContent = fmt(t) + ' / ' + fmt(d) + ' s';
    if (d > 0) scrubber.value = Math.round((t / d) * 1000);
    if (!d) { playhead.style.display = 'none'; return; }
    const leftPct = dataLeftFrac * 100.0;
    const widthPct = 100.0 - leftPct;
    const frac = Math.max(0, Math.min(1, t / d));
    playhead.style.left = (leftPct + frac * widthPct) + '%';
    playhead.style.display = 'block';
    playhead.style.opacity = (!audio.paused && t < d) ? '0.85' : '0.5';
  }
  function tick() {
    if (previewStopAt !== null && audio.currentTime >= previewStopAt) {
      audio.pause();
      previewStopAt = null;
      clearBandpass();
    }
    updateTime();
    if (!audio.paused && !audio.ended) requestAnimationFrame(tick);
  }
  audio.addEventListener('timeupdate', updateTime);
  audio.addEventListener('seeked', updateTime);
  audio.addEventListener('pause', () => { playBtn.innerHTML = ICON_PLAY; updateTime(); });
  audio.addEventListener('play',  () => { playBtn.innerHTML = ICON_PAUSE; tick(); });
  audio.addEventListener('ended', () => { playBtn.innerHTML = ICON_PLAY; previewStopAt = null; updateTime(); });
  audio.addEventListener('loadedmetadata', updateTime);

  playBtn.addEventListener('click', () => {
    previewStopAt = null;
    clearBandpass();
    if (audio.paused) audio.play().catch(function () {});
    else audio.pause();
  });
  scrubber.addEventListener('input', () => {
    previewStopAt = null;
    clearBandpass();
    if (!isFinite(audio.duration)) return;
    audio.currentTime = (Number(scrubber.value) / 1000) * audio.duration;
  });

  // ---------- controls -----------------------------------------------------
  function setActiveLabel(label) {
    activeLabel = label;
    btnTom.classList.toggle('active', label === 'Tom');
    btnHen.classList.toggle('active', label === 'Hen');
    labelHint.textContent = label;
    labelHint.style.borderLeft = '4px solid ' + activeStroke();
    sendValue();
  }
  btnTom.addEventListener('click', () => setActiveLabel('Tom'));
  btnHen.addEventListener('click', () => setActiveLabel('Hen'));
  otherBirdsCb.addEventListener('change', sendValue);
  unsureCb.addEventListener('change', sendValue);

  // ---------- streamlit render --------------------------------------------
  function applyArgs(args) {
    const bgUrl = args.backgroundImageUrl || '';
    const audioUrl = args.audioUrl || '';
    const w = args.width || 1200;
    const h = args.height || 320;
    if (args.strokeColorTom) strokeTom = args.strokeColorTom;
    if (args.strokeColorHen) strokeHen = args.strokeColorHen;
    if (typeof args.dataLeftFrac === 'number') dataLeftFrac = args.dataLeftFrac;
    if (typeof args.dataBottomFrac === 'number') dataBottomFrac = args.dataBottomFrac;
    if (typeof args.dataTopFrac === 'number') dataTopFrac = args.dataTopFrac;
    if (typeof args.fminHz === 'number') fminHz = args.fminHz;
    if (typeof args.fmaxHz === 'number') fmaxHz = args.fmaxHz;

    if (img.getAttribute('src') !== bgUrl) img.setAttribute('src', bgUrl);
    // Keep the canvas's drawing-buffer resolution (`canvas.width/height`) at the
    // requested pixel size for accurate annotation, but let CSS scale both the
    // img and the canvas to fill the iframe width via the stylesheet rules above.
    canvas.width = w; canvas.height = h;

    if (audioUrl && audioSrc.getAttribute('src') !== audioUrl) {
      audioSrc.setAttribute('src', audioUrl);
      audio.load();
      previewStopAt = null;
      clearBandpass();
      audio.play().catch(function () {});
    }

    if (args.frameKey && args.frameKey !== frameKey) {
      frameKey = args.frameKey;
      rectangles = (args.initialRects || []).map(r => ({
        x: r.left, y: r.top, w: r.width, h: r.height,
        stroke: r.stroke, label: r.label,
      }));
      setActiveLabel(args.initialActiveLabel || 'Tom');
      otherBirdsCb.checked = !!args.initialOtherBirds;
      unsureCb.checked = !!args.initialUnsure;
      sendValue();
    }

    redraw();
    updateTime();
    // Defer height calc until the new spectrogram has laid out — img.onload fires
    // when the data URI resolves; until then, send a conservative fallback so the
    // iframe doesn't collapse during the swap.
    sendFrameHeight((document.body.scrollHeight || 320) + 4);
  }

  img.addEventListener('load', () => {
    sendFrameHeight(document.body.scrollHeight + 4);
  });
  window.addEventListener('resize', () => {
    sendFrameHeight(document.body.scrollHeight + 4);
  });
  window.addEventListener('message', (event) => {
    if (event.data && event.data.type === 'streamlit:render') {
      applyArgs(event.data.args || {});
    }
  });

  send('streamlit:componentReady', { apiVersion: 1 });
  sendFrameHeight(440);
})();
</script>
</body>
</html>
