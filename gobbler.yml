name: gobbler

# Minimal environment. Conda provides Python, CUDA-enabled PyTorch, and ffmpeg.
# Everything else (librosa, streamlit, birdnetlib, transformers, optuna, etc.) is
# installed by `pip install -e .` via pyproject.toml after the env is created.

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - pytorch=2.5.1
  - torchaudio=2.5.1
  - pytorch-cuda=12.1
  - ffmpeg
  - pip:
      # BirdNET runs on TensorFlow under the hood; birdnetlib does not declare
      # it as a dependency, so we install it here.
      - tensorflow==2.21.0
